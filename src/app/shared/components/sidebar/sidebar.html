<div class="sidebar">
  
  <!-- Logo -->
  <div class="mb-4 pb-3" style="border-bottom: 1px solid rgba(255,255,255,0.2)">
    <h5 class="fw-bold mb-0">
      <i class="bi bi-people-fill me-2"></i>Employee Management
    </h5>
  </div>

  <!-- Nav Links -->
  <ul class="nav flex-column gap-1 flex-grow-1">
    @for(item of items; track item.tab) {
      <li class="nav-item">
        <a class="nav-link"
          [class.active]="activeTab === item.tab"
          (click)="setTab(item.tab)" role="button">
          <i class="bi {{item.icon}} me-2"></i>{{ item.label }}
        </a>
      </li>
    }
  </ul>

  <!-- Bottom Profile + Logout -->
  <div class="user-profile">
    <div class="d-flex align-items-center gap-2 mb-2">
      <div class="avatar">
        <i class="bi bi-person-fill text-primary fs-5"></i>
      </div>
      <div>
        <div class="fw-semibold small">{{ userName }}</div>
        <div class="small opacity-75">{{ userRole }}</div>
      </div>
    </div>
    <a class="nav-link" (click)="onLogout.emit()" role="button">
      <i class="bi bi-box-arrow-left me-2"></i>Logout
    </a>
  </div>

</div>
