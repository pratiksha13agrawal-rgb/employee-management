@if(loadingService.isLoading()) {
  <div class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center"
    style="background:rgba(0,0,0,0.3); z-index: 9999;">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
}
@if(toastService.visible()) {
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div class="toast show align-items-center text-white border-0"
      [ngClass]="{
        'bg-success': toastService.type() === 'success',
        'bg-danger': toastService.type() === 'error',
        'bg-warning': toastService.type() === 'warning'
      }">
      <div class="d-flex">
        <div class="toast-body fw-semibold">
          {{ toastService.message() }}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto"
          (click)="toastService.visible.set(false)">
        </button>
      </div>
    </div>
  </div>
}
