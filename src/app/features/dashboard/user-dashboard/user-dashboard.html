<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">

      @if(profile()) {
        <div class="card shadow-sm border-0">
          
          <!-- Profile Header -->
          <div class="card-body text-center bg-primary text-white rounded-top py-4">
            <i class="bi bi-person-circle" style="font-size: 80px;"></i>
            <h5 class="mt-2 mb-0">{{ profile()!.name }}</h5>
            <small>{{ profile()!.role | titlecase }}</small>
          </div>

          <!-- Profile Info -->
          <div class="card-body">
            @if(!isEditMode) {
              <!-- View Mode -->
              <div class="mb-2">
                <label class="fw-bold">Email:</label>
                <p class="text-muted">{{ profile()!.email }}</p>
              </div>
              <div class="mb-2">
                <label class="fw-bold">Phone:</label>
                <p class="text-muted">{{ profile()!.phone }}</p>
              </div>
              <div class="mb-2">
                <label class="fw-bold">Department:</label>
                <p class="text-muted">{{ profile()!.department }}</p>
              </div>
              <div class="mb-2">
                <label class="fw-bold">Salary:</label>
                <p class="text-muted">₹{{ profile()!.salary | number }}</p>
              </div>
              <button class="btn btn-primary w-100"
                (click)="isEditMode = true">
                <i class="bi bi-pencil me-2"></i>Edit Profile
              </button>
            } @else {
              <!-- Edit Mode -->
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control"
                  [(ngModel)]="profile()!.name">
              </div>
              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control"
                  [(ngModel)]="profile()!.phone">
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control"
                  [value]="profile()!.email" disabled>
              </div>
              <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" class="form-control"
                  [value]="profile()!.department" disabled>
              </div>
              <div class="mb-3">
                <label class="form-label">Role</label>
                <input type="text" class="form-control"
                  [value]="profile()!.role" disabled>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-success w-100"
                  (click)="updateProfile()">
                  <i class="bi bi-check-circle me-2"></i>Update
                </button>
                <button class="btn btn-secondary w-100"
                  (click)="isEditMode = false">
                  Cancel
                </button>
              </div>
            }
          </div>

        </div>
      } @else {
        <div class="alert alert-warning">
          Profile not found! Contact admin.
        </div>
      }

    </div>
  </div>
</div>
